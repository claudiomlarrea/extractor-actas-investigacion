# Menos UI de “desarrollador” en la esquina superior derecha para quienes visitan la app.
# https://docs.streamlit.io/develop/api-reference/configuration/config.toml
[client]
toolbarMode = "viewer"

# Fondos tipo EvaluAR: principal más claro, sidebar mint más marcado.
# El botón de envío del formulario Consejo sigue en rojo por CSS de la página.
[theme]
primaryColor = "#0B6B5D"
backgroundColor = "#EEF6F2"
secondaryBackgroundColor = "#CFE4DA"
textColor = "#1e293b"
font = "sans serif"
