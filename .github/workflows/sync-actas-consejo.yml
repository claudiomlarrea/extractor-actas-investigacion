# Sincroniza actas PDF del Consejo → planilla Looker (Hoja 2).
# Requiere GOOGLE_SA_JSON (misma cuenta de servicio que publicaciones/OpenAlex).

name: Sync Actas Consejo → Looker

on:
  schedule:
    # Lunes 11:00 UTC (~08:00 Argentina) — complementa el sistema Consejo
    - cron: "0 11 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r scripts/requirements-actas-sync.txt

      - name: Credenciales Google
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          if [ -z "$GOOGLE_SA_JSON" ]; then
            echo "::error::Falta el secreto GOOGLE_SA_JSON"
            exit 1
          fi
          echo "$GOOGLE_SA_JSON" > "${RUNNER_TEMP}/google-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/google-sa.json" >> "$GITHUB_ENV"

      - name: Actas PDF → Datos Consejo (Hoja 2)
        env:
          CONSEJO_SHEET_ID: "17MiyW17W7oLIwSCKjDXCoA85CwBkYqHYhDKblVN37c8"
          CONSEJO_SHEET_TAB: "Hoja 2"
          ACTAS_DRIVE_FOLDER_ID: ${{ secrets.ACTAS_DRIVE_FOLDER_ID }}
          ACTAS_DRIVE_FOLDER_IDS: ${{ secrets.ACTAS_DRIVE_FOLDER_IDS }}
          ACTAS_YEARS: "2023,2024,2025"
        run: |
          if [ -z "$ACTAS_DRIVE_FOLDER_ID" ] && [ -z "$ACTAS_DRIVE_FOLDER_IDS" ]; then
            echo "::error::Falta ACTAS_DRIVE_FOLDER_ID o ACTAS_DRIVE_FOLDER_IDS en GitHub Secrets"
            exit 1
          fi
          python3 scripts/sync_actas_consejo.py
